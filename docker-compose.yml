version: "3.8"
services:
  app:
    build: .
    ports:
      - "5000:3306"
    environment:
      - DATABASE_URL=mysql://root:@localhost:5000/API
    depends_on:
      - mysql
    restart: always

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: senha
      MYSQL_DATABASE: API
    volumes:
      - mysql-data:/var/lib/mysql
    restart: always

volumes:
  mysql-data:
