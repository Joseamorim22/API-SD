<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Items Interface</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Interface da API de Itens</h1>

    <!-- Exibir os itens -->
    <div id="itemsList">
        <h2>Itens</h2>
        <ul id="itemListUl"></ul>
    </div>

    <!-- Adicionar um novo item -->
    <div id="addItemForm">
        <h2>Adicionar Item</h2>
        <input type="text" id="itemName" placeholder="Nome do Item">
        <input type="number" id="itemPrice" placeholder="Preço">
        <button onclick="addItem()">Adicionar Item</button>
    </div>

    <!-- Atualizar um item -->
    <div id="updateItemForm">
        <h2>Atualizar Item</h2>
        <input type="number" id="updateItemId" placeholder="ID do Item">
        <input type="text" id="updateItemName" placeholder="Novo Nome">
        <input type="number" id="updateItemPrice" placeholder="Novo Preço">
        <button onclick="updateItem()">Atualizar Item</button>
    </div>

    <!-- Remover um item -->
    <div id="removeItemForm">
        <h2>Remover Item</h2>
        <input type="number" id="removeItemId" placeholder="ID do Item">
        <button onclick="removeItem()">Remover Item</button>
    </div>

    <script src="app.js"></script>
</body>

</html>
